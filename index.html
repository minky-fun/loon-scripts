<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Loon Scripts</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7f9;
        --panel: #ffffff;
        --text: #1f2933;
        --muted: #667085;
        --line: #d9dee7;
        --link: #0f6cbd;
        --head: #eef2f7;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.5;
      }

      main {
        width: min(1180px, calc(100% - 32px));
        margin: 40px auto;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 28px;
        font-weight: 700;
        letter-spacing: 0;
      }

      .tip {
        margin: 0 0 24px;
        color: var(--muted);
        font-size: 14px;
      }

      .table-wrap {
        overflow-x: auto;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 320px;
      }

      th,
      td {
        padding: 14px 16px;
        border-bottom: 1px solid var(--line);
        text-align: left;
        vertical-align: top;
      }

      th {
        background: var(--head);
        font-size: 13px;
        font-weight: 700;
        color: #344054;
      }

      tr:last-child td {
        border-bottom: 0;
      }

      a {
        color: var(--link);
        text-decoration: none;
        font-weight: 600;
      }

      a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Loon Scripts</h1>
      <p class="tip">点击插件名称即可导入 Loon。</p>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>插件名称</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td><a href="https://www.nsloon.com/openloon/import?plugin=https://raw.githubusercontent.com/minky-fun/loon-scripts/main/plugins/hlwxx_remove_ads.lpx">黑料网净化</a></td>
            </tr>
            <tr>
              <td><a href="https://www.nsloon.com/openloon/import?plugin=https://raw.githubusercontent.com/minky-fun/loon-scripts/main/plugins/huanxiu_vip_unlock.lpx">幻休 VIP 解锁</a></td>
            </tr>
            <tr>
              <td><a href="https://www.nsloon.com/openloon/import?plugin=https://raw.githubusercontent.com/minky-fun/loon-scripts/main/plugins/zhixing.lpx">智行火车票去广告</a></td>
            </tr>
            <tr>
              <td><a href="https://www.nsloon.com/openloon/import?plugin=https://raw.githubusercontent.com/minky-fun/loon-scripts/main/plugins/CainiaoHeaders.plugin">菜鸟请求头抓取</a></td>
            </tr>
            <tr>
              <td><a href="https://www.nsloon.com/openloon/import?plugin=https://raw.githubusercontent.com/minky-fun/loon-scripts/main/plugins/MangoTV_Vip.plugin">芒果tv解锁会员</a></td>
            </tr>
            <tr>
              <td><a href="https://www.nsloon.com/openloon/import?plugin=https://raw.githubusercontent.com/minky-fun/loon-scripts/main/plugins/PingMe_Loon.plugin">PingMe(Loon)</a></td>
            </tr>
            <tr>
              <td><a href="https://www.nsloon.com/openloon/import?plugin=https://raw.githubusercontent.com/minky-fun/loon-scripts/main/plugins/TilingSales.plugin">瓜子影视净化</a></td>
            </tr>
            <tr>
              <td><a href="https://www.nsloon.com/openloon/import?plugin=https://raw.githubusercontent.com/minky-fun/loon-scripts/main/plugins/chinaunicom.plugin">联通Cookie获取</a></td>
            </tr>
            <tr>
              <td><a href="https://www.nsloon.com/openloon/import?plugin=https://raw.githubusercontent.com/minky-fun/loon-scripts/main/plugins/iios_checkin_loon.plugin">iios签到</a></td>
            </tr>
            <tr>
              <td><a href="https://www.nsloon.com/openloon/import?plugin=https://raw.githubusercontent.com/minky-fun/loon-scripts/main/plugins/mixc_signin_loon.plugin">一点万象签到</a></td>
            </tr>
            <tr>
              <td><a href="https://www.nsloon.com/openloon/import?plugin=https://raw.githubusercontent.com/minky-fun/loon-scripts/main/plugins/yuchenios.plugin">雨辰ios签到</a></td>
            </tr>
          </tbody>
        </table>
      </div>
    </main>
  </body>
</html>
